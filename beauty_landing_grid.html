<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beauty Landing Metrics ✨</title>
<script src="/d/_libs/chart.min.js"></script>
<style>
:root {
  --bg:#f4f5f7; --surface:#fff; --nav:#1a1a2e;
  --border:#e5e7eb; --text:#1a1a2e; --muted:#6b7280;
  --yellow:#ffe234; --green:#00a650; --green-bg:#e6f7ee;
  --red:#e53e3e; --red-bg:#fff0f0; --blue:#1d6fa4;
  --pink:#e91e8c;
}
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
body { font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:var(--bg); color:var(--text); font-size:13px; }

.topbar { background:var(--nav); display:flex; align-items:center; gap:14px; padding:0 20px; height:46px; position:sticky; top:0; z-index:200; border-bottom:1px solid #2d3139; }
.meli-logo { background:var(--yellow); color:var(--nav); font-weight:700; font-size:12px; padding:4px 8px; border-radius:4px; }
.topbar-title { color:#e5e7eb; font-size:13px; font-weight:500; }
.topbar-right { margin-left:auto; display:flex; align-items:center; gap:10px; }
.live-badge { display:flex; align-items:center; gap:5px; font-size:11px; color:var(--green); background:rgba(0,166,80,.12); padding:3px 10px; border-radius:20px; }
.live-dot { width:6px; height:6px; border-radius:50%; background:var(--green); animation:blink 1.5s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
.updated-text { font-size:11px; color:#6b7280; }
.refresh-btn { background:var(--yellow); color:var(--nav); border:none; border-radius:6px; font-size:11px; font-weight:600; padding:5px 12px; cursor:pointer; }

.filterbar { background:var(--nav); display:flex; align-items:center; gap:5px; padding:0 20px; height:44px; border-bottom:1px solid #2d3139; overflow-x:auto; flex-wrap:nowrap; }
.fl { font-size:10px; color:#9ca3af; text-transform:uppercase; letter-spacing:.08em; margin-right:2px; white-space:nowrap; }
.chip { font-size:11px; font-weight:500; padding:3px 10px; border-radius:4px; border:1px solid #374151; background:transparent; color:#d1d5db; cursor:pointer; white-space:nowrap; transition:all .15s; }
.chip:hover { border-color:#6b7280; color:#fff; }
.chip.pactive { background:var(--yellow); color:var(--nav); border-color:var(--yellow); font-weight:700; }
.chip.active  { background:#2563eb; color:#fff; border-color:#2563eb; }
.sep { width:1px; height:20px; background:#374151; margin:0 3px; flex-shrink:0; }

.subnav { background:var(--surface); display:flex; padding:0 20px; border-bottom:2px solid var(--border); }
.stab { display:flex; align-items:center; gap:6px; padding:11px 14px; font-size:12px; font-weight:500; color:var(--muted); cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-2px; white-space:nowrap; }
.stab:hover { color:var(--text); }
.stab.active { color:var(--text); border-bottom-color:var(--yellow); font-weight:600; }

.main { padding:14px 20px; max-width:1600px; }

.sec-hdr { background:var(--nav); border-radius:8px 8px 0 0; padding:8px 14px; display:flex; align-items:center; justify-content:space-between; }
.sec-title { font-size:11px; font-weight:700; color:var(--yellow); letter-spacing:.1em; text-transform:uppercase; }
.sec-sub { font-size:10px; color:#9ca3af; }
.kpi-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(155px,1fr)); border:1px solid var(--border); border-top:none; border-radius:0 0 8px 8px; overflow:hidden; background:var(--surface); margin-bottom:12px; }
.kpi { padding:11px 13px; border-right:1px solid var(--border); border-bottom:1px solid var(--border); position:relative; }
.kpi-accent { position:absolute; top:0; left:0; width:3px; height:100%; }
.kpi-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:3px; }
.kpi-name { font-size:10px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:.06em; }
.kpi-key { font-size:10px; font-weight:700; color:var(--muted); background:#f3f4f6; width:17px; height:17px; border-radius:3px; display:flex; align-items:center; justify-content:center; }
.kpi-val { font-size:20px; font-weight:700; line-height:1.1; letter-spacing:-.02em; margin-bottom:3px; }
.kpi-delta { font-size:11px; font-weight:600; margin-bottom:2px; }
.kpi-bench { font-size:10px; color:var(--muted); margin-top:3px; border-top:1px solid #f3f4f6; padding-top:3px; }
.up { color:var(--green); } .down { color:var(--red); } .flat { color:var(--muted); }
.kpi-prev { font-size:10px; color:var(--muted); }

.charts-row { display:grid; grid-template-columns:2fr 1fr; gap:12px; margin-bottom:12px; }
.chart-card { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:13px; }
.cc-title { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); margin-bottom:10px; display:flex; align-items:center; justify-content:space-between; }
.metric-sel { font-family:inherit; font-size:11px; padding:3px 7px; border:1px solid var(--border); border-radius:4px; color:var(--text); background:var(--surface); cursor:pointer; }

.tbl-card { background:var(--surface); border:1px solid var(--border); border-radius:8px; overflow:hidden; margin-bottom:12px; }
.tbl-top { display:flex; align-items:center; justify-content:space-between; padding:9px 13px; border-bottom:1px solid var(--border); }
.tbl-title { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); }
table { width:100%; border-collapse:collapse; }
thead th { font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:.06em; color:var(--muted); padding:7px 11px; text-align:left; border-bottom:1px solid var(--border); background:#f9fafb; white-space:nowrap; }
tbody td { padding:8px 11px; border-bottom:1px solid #f3f4f6; font-size:12px; white-space:nowrap; }
tbody tr:last-child td { border-bottom:none; }
tbody tr:hover td { background:#f9fafb; }
.bar-m { display:flex; align-items:center; gap:5px; }
.bar-bg { width:60px; height:4px; background:#e5e7eb; border-radius:2px; overflow:hidden; }
.bar-f { height:100%; border-radius:2px; }
.rank { font-size:10px; font-weight:700; color:var(--muted); background:#f3f4f6; width:18px; height:18px; border-radius:3px; display:flex; align-items:center; justify-content:center; }

.month-group { margin-bottom:20px; }
.month-label { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
.month-label-text { font-size:11px; font-weight:700; color:var(--yellow); letter-spacing:.12em; text-transform:uppercase; background:var(--nav); padding:4px 12px; border-radius:20px; }
.month-label-line { flex:1; height:1px; background:var(--border); }
.camp-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(270px,1fr)); gap:12px; }
.camp-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; overflow:hidden; cursor:pointer; transition:all .2s; }
.camp-card:hover { border-color:var(--pink); box-shadow:0 0 0 1px var(--pink); transform:translateY(-1px); }
.camp-card.no-data:hover { border-color:#6b7280; box-shadow:0 0 0 1px #6b7280; }
.camp-banner { background:linear-gradient(135deg,#1a1a2e 0%,#2d1a2e 50%,#1a1a2e 100%); padding:16px 18px; display:flex; align-items:flex-start; justify-content:space-between; }
.camp-banner.no-data-banner { background:linear-gradient(135deg,#1a1a2e 0%,#1f2937 100%); }
.camp-banner-title { color:#fff; font-weight:700; font-size:14px; line-height:1.3; }
.camp-banner-emoji { font-size:28px; flex-shrink:0; margin-left:8px; }
.camp-banner-date { color:#9ca3af; font-size:11px; margin-top:3px; }
.camp-banner-meta { display:flex; gap:6px; margin-top:6px; flex-wrap:wrap; }
.camp-tag { font-size:10px; font-weight:600; padding:2px 7px; border-radius:10px; background:rgba(255,255,255,.08); color:#d1d5db; border:1px solid rgba(255,255,255,.12); }
.camp-tag.landing   { background:rgba(233,30,140,.15); color:#f9a8d4; border-color:rgba(233,30,140,.3); }
.camp-tag.container { background:rgba(29,111,164,.15); color:#93c5fd; border-color:rgba(29,111,164,.3); }
.camp-body { padding:12px 14px; }
.camp-kpis { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.camp-kpi { background:#f9fafb; border-radius:6px; padding:8px 10px; }
.camp-kpi-label { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:.06em; margin-bottom:2px; }
.camp-kpi-val { font-size:16px; font-weight:700; }
.camp-kpi-yoy { font-size:11px; font-weight:600; margin-top:2px; }
.camp-no-data-msg { font-size:11px; color:var(--muted); padding:8px 14px 10px; font-style:italic; }

.detail-panel { background:var(--surface); border:1px solid var(--border); border-radius:8px; overflow:hidden; margin-bottom:16px; }
.detail-hdr { background:linear-gradient(135deg,#1a1a2e 0%,#2d1a2e 100%); padding:16px 20px; display:flex; align-items:center; gap:12px; }
.detail-back { background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.15); color:#fff; font-size:11px; font-weight:600; padding:5px 12px; border-radius:6px; cursor:pointer; display:flex; align-items:center; gap:5px; transition:background .15s; }
.detail-back:hover { background:rgba(255,255,255,.18); }
.detail-emoji { font-size:30px; }
.detail-title { color:#fff; font-size:16px; font-weight:700; }
.detail-dates { color:#9ca3af; font-size:12px; margin-top:2px; }
.detail-tags { display:flex; gap:6px; margin-top:6px; }
.detail-kpi-row { display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); border-bottom:1px solid var(--border); }
.detail-kpi { padding:14px 16px; border-right:1px solid var(--border); }
.detail-kpi:last-child { border-right:none; }
.detail-kpi-label { font-size:10px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:.06em; margin-bottom:4px; }
.detail-kpi-val { font-size:22px; font-weight:700; letter-spacing:-.02em; margin-bottom:3px; }
.detail-kpi-yoy { font-size:11px; font-weight:600; }
.detail-kpi-prev { font-size:10px; color:var(--muted); margin-top:1px; }
.detail-body { padding:14px 16px; }
.detail-chart-wrap { margin-bottom:16px; }
.detail-empty { color:var(--muted); font-size:12px; font-style:italic; padding:20px 16px; text-align:center; }

.ms-section { background:var(--surface); border:1px solid var(--border); border-radius:8px; overflow:hidden; margin-bottom:14px; }
.ms-hdr { background:linear-gradient(90deg,#1a1a2e 0%,#1a2332 100%); padding:10px 16px; display:flex; align-items:center; justify-content:space-between; }
.ms-title { font-size:11px; font-weight:700; color:var(--yellow); letter-spacing:.1em; text-transform:uppercase; }
.ms-sub { font-size:10px; color:#9ca3af; }
.ms-kpis { display:grid; grid-template-columns:repeat(auto-fill,minmax(175px,1fr)); border-bottom:1px solid var(--border); }
.ms-kpi { padding:12px 14px; border-right:1px solid var(--border); }
.ms-kpi:last-child { border-right:none; }
.ms-kpi-label { font-size:10px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:.06em; margin-bottom:4px; }
.ms-kpi-val { font-size:22px; font-weight:700; letter-spacing:-.02em; }
.ms-kpi-note { font-size:10px; color:var(--muted); margin-top:2px; }
.ms-chart-wrap { padding:14px; }

#spinner { position:fixed; inset:0; background:var(--nav); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; z-index:999; }
.spin { width:30px; height:30px; border:2px solid #374151; border-top-color:var(--yellow); border-radius:50%; animation:rot .8s linear infinite; }
@keyframes rot { to { transform:rotate(360deg); } }
.spin-msg { font-size:12px; color:#9ca3af; letter-spacing:.06em; }
#dashboard { display:none; }

.evol-tbl { width:100%; border-collapse:collapse; }
.evol-tbl th { background:var(--nav); color:var(--yellow); font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.08em; padding:8px 11px; text-align:left; }
.evol-tbl td { padding:8px 11px; font-size:12px; border-bottom:1px solid #f3f4f6; }
.evol-tbl tr:last-child td { border-bottom:none; }
.evol-tbl tr:hover td { background:#f9fafb; }

/* ── Funnel tab ─────────────────────────────────────────────────────── */
.funnel-wrap { max-width:680px; margin:0 auto; }
.funnel-step { position:relative; margin-bottom:6px; }
.funnel-bar-outer { border-radius:6px; overflow:hidden; background:#f3f4f6; height:56px; position:relative; }
.funnel-bar-fill { height:100%; border-radius:6px; display:flex; align-items:center; padding:0 16px; transition:width .4s ease; }
.funnel-bar-label { font-size:13px; font-weight:700; color:#fff; white-space:nowrap; }
.funnel-bar-val   { font-size:12px; color:rgba(255,255,255,.85); margin-left:8px; }
.funnel-bar-pct   { position:absolute; right:12px; top:50%; transform:translateY(-50%); font-size:12px; font-weight:700; color:#374151; }
.funnel-arrow { text-align:center; color:#d1d5db; font-size:11px; margin:2px 0; display:flex; align-items:center; justify-content:center; gap:6px; }
.funnel-dropoff { background:#fff0f0; color:#e53e3e; font-size:11px; font-weight:700; padding:2px 8px; border-radius:10px; }
.funnel-monthly-wrap { margin-top:20px; }
/* ── Social tab ─────────────────────────────────────────────────────── */
.social-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(230px,1fr)); gap:12px; margin-bottom:14px; }
.sc-card { background:var(--surface); border:1px solid var(--border); border-radius:10px; overflow:hidden; }
.sc-banner { padding:12px 14px 10px; display:flex; align-items:center; gap:10px; }
.sc-emoji { font-size:22px; flex-shrink:0; }
.sc-label { font-size:12px; font-weight:700; color:#fff; line-height:1.2; }
.sc-kpis { display:grid; grid-template-columns:1fr 1fr; gap:1px; background:var(--border); border-top:1px solid var(--border); }
.sc-kpi { background:var(--surface); padding:9px 12px; }
.sc-kpi-label { font-size:9px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.07em; margin-bottom:2px; }
.sc-kpi-val { font-size:17px; font-weight:700; line-height:1.1; }
.sc-kpi-trend { font-size:10px; font-weight:600; margin-top:2px; }
.insight-list { display:flex; flex-direction:column; gap:10px; margin-bottom:14px; }
.insight-item { background:var(--surface); border:1px solid var(--border); border-left-width:4px; border-radius:0 8px 8px 0; padding:11px 14px; display:flex; gap:10px; align-items:flex-start; }
.insight-icon { font-size:18px; flex-shrink:0; margin-top:1px; }
.insight-body { flex:1; }
.insight-title { font-size:11px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.07em; margin-bottom:3px; }
.insight-text { font-size:12px; line-height:1.5; }
.insight-text code { background:#f3f4f6; padding:1px 4px; border-radius:3px; font-size:10px; font-family:monospace; }

@media(max-width:900px) {
  .charts-row { grid-template-columns:1fr; }
  .kpi-grid { grid-template-columns:repeat(2,1fr); }
  .camp-grid { grid-template-columns:1fr; }
  .social-grid { grid-template-columns:1fr 1fr; }
}
</style>
</head>
<body>

  <div class="meli-logo">MercadoLibre</div>
  <div class="spin"></div>
  <div class="spin-msg" id="spinMsg">CARGANDO DATOS...</div>
</div>

<div id="dashboard">
  <div class="topbar">
    <div class="meli-logo">MercadoLibre</div>

  <div class="main" id="mc"></div>
</div>

// ── Data aggregation ─────────────────────────────────────────────────────
function sumRange(rows, start, end) {
  if (!rows||!start||!end) return null;
  var inRange = rows.filter(function(r){ return r.date>=start&&r.date<=end; });
  if (!inRange.length) return null;
  var totSes = inRange.reduce(function(a,r){ return a+r.sessions; }, 0);
  return {
    sessions: totSes,
    nmv:      inRange.reduce(function(a,r){ return a+r.nmv; },    0),
    orders:   inRange.reduce(function(a,r){ return a+r.orders; }, 0),
    buyers:   inRange.reduce(function(a,r){ return a+r.buyers; }, 0),
    nsi:      inRange.reduce(function(a,r){ return a+r.nsi; },    0),
    ctr: totSes>0 ? Math.round(inRange.reduce(function(a,r){return a+r.ctr*r.sessions;},0)/totSes*100)/100 : 0,
    cvr: totSes>0 ? Math.round(inRange.reduce(function(a,r){return a+r.cvr*r.sessions;},0)/totSes*100)/100 : 0
  };
}

function groupContainers(rows) {
  var map = {};
  rows.forEach(function(r){
    if (!map[r.container]) map[r.container]={container:r.container,sessions:0,nmv:0,orders:0,buyers:0,nsi:0,ctr:0,cvr:0,_days:0};
    map[r.container].sessions+=r.sessions; map[r.container].nmv+=r.nmv;
    map[r.container].orders+=r.orders;     map[r.container].buyers+=r.buyers;
    map[r.container].nsi+=r.nsi;           map[r.container].ctr+=r.ctr;
    map[r.container].cvr+=r.cvr;           map[r.container]._days+=1;
  });
  return Object.values(map).map(function(c){
    if (c._days>0){ c.ctr=Math.round(c.ctr/c._days*100)/100; c.cvr=Math.round(c.cvr/c._days*100)/100; }
    delete c._days; return c;
  }).sort(function(a,b){ return b.sessions-a.sessions; });
}

function sumContainerRows(rows) {
  if (!rows || !rows.length) return null;
  var totSes = rows.reduce(function(a,r){ return a+r.sessions; }, 0);
  if (!totSes) return null;
  return {
    sessions: totSes,
    nmv:    rows.reduce(function(a,r){ return a+r.nmv;    }, 0),
    orders: rows.reduce(function(a,r){ return a+r.orders; }, 0),
    buyers: rows.reduce(function(a,r){ return a+r.buyers; }, 0),
    nsi:    rows.reduce(function(a,r){ return a+r.nsi;    }, 0),
    ctr: totSes>0 ? Math.round(rows.reduce(function(a,r){return a+r.ctr*r.sessions;},0)/totSes*100)/100 : 0,
    cvr: totSes>0 ? Math.round(rows.reduce(function(a,r){return a+r.cvr*r.sessions;},0)/totSes*100)/100 : 0
  };
}
function buildCampanasData(allLanding, allContainers) {
  var campanasData = {};
  CAMPANAS.forEach(function(c){
    var lc = c.landingContainers; // null = todos; array = filtrar por nombre
    var cont26 = allContainers.filter(function(r){
      if (r.date < c.start || r.date > c.end) return false;
      return !lc || lc.indexOf(r.container) > -1;
    });
    var cont25 = c.start25 ? allContainers.filter(function(r){
      if (r.date < c.start25 || r.date > c.end25) return false;
      return !lc || lc.indexOf(r.container) > -1;
    }) : [];
    var useContData = c.tipo === 'Container' && cont26.length > 0;
    campanasData[c.id] = {
      campana:        c,
      totales2026:    useContData ? sumContainerRows(cont26) : sumRange(allLanding, c.start, c.end),
      totales2025:    c.start25 ? (useContData ? sumContainerRows(cont25) : sumRange(allLanding, c.start25, c.end25)) : null,
      containers2026: groupContainers(cont26),
      containers2025: c.start25 ? groupContainers(cont25) : []
    };
  });
  return campanasData;
}

function computeMSComparativa(beauty, home, placements) {
  try {
    var bTotClicks = beauty.reduce(function(a,r){return a+r.clicks;},0);
    var bTotPrints = beauty.reduce(function(a,r){return a+r.prints;},0);
    var hTotClicks = home.reduce(function(a,r){return a+r.clicks;},0);
    var hTotPrints = home.reduce(function(a,r){return a+r.prints;},0);
    var avgBeauty  = bTotPrints>0?Math.round(bTotClicks/bTotPrints*10000)/100:0;
    var avgHome    = hTotPrints>0?Math.round(hTotClicks/hTotPrints*10000)/100:0;
    var perCamp = CAMPANAS.map(function(c){
      var bRows=beauty.filter(function(r){return r.date>=c.start&&r.date<=c.end;});
      var hRows=home.filter(function(r){return r.date>=c.start&&r.date<=c.end;});
      var bC=bRows.reduce(function(a,r){return a+r.clicks;},0);
      var bP=bRows.reduce(function(a,r){return a+r.prints;},0);
      var hC=hRows.reduce(function(a,r){return a+r.clicks;},0);
      var hP=hRows.reduce(function(a,r){return a+r.prints;},0);
      var sm = (typeof MS_SITEMERC !== 'undefined' && MS_SITEMERC[c.id]) ? MS_SITEMERC[c.id] : null;
      return {id:c.id,nombre:c.nombre,start:c.start,end:c.end,
        ctrBeauty:  bP>0?Math.round(bC/bP*10000)/100:0,
        ctrHome:    hP>0?Math.round(hC/hP*10000)/100:0,
        ctrSiteMerc:sm?sm.ctr:null,
        smPrints:   sm?sm.prints:null,
        smClicks:   sm?sm.clicks:null,
        hasData:    bP>0||sm!=null};
    });
    var smVals=(perCamp||[]).filter(function(p){return p.ctrSiteMerc!=null;});
    var avgSiteMerc=smVals.length?Math.round(smVals.reduce(function(a,p){return a+p.ctrSiteMerc;},0)/smVals.length*100)/100:0;
    return {ok:true,avgBeauty:avgBeauty,avgHome:avgHome,avgSiteMerc:avgSiteMerc,perCamp:perCamp,
            beautyDaily:beauty,homeDaily:home,placements:placements||[]};
  } catch(ex) {
    return {ok:false,error:String(ex),avgBeauty:0,avgHome:0,perCamp:[],beautyDaily:[],homeDaily:[],placements:[]};
  }
}

function fNum(n){
  if (n==null) return '–';
  if (n>=1000000) return (n/1000000).toFixed(1)+'M';
  if (n>=1000)    return Math.round(n/1000)+'K';
  return n.toFixed(0);
}
function fMoney(n){
  if (n==null) return '–';
  if (n>=1000000) return '$'+(n/1000000).toFixed(1)+'M';
  if (n>=1000)    return '$'+Math.round(n/1000)+'K';
  return '$'+n.toFixed(0);
}
function fPct(n){ return n==null?'–':n.toFixed(2)+'%'; }
function yoy(v26,v25){
  if (v25==null||v25===0) return {pct:null,dir:'flat'};
  var p=Math.round((v26-v25)/v25*1000)/10;
  return {pct:p,dir:p>0?'up':(p<0?'down':'flat')};
}

function buildWeekly(data){

  data.forEach(function(r){
    var d=new Date(r.date+'T00:00:00Z');

    var k=mon.toISOString().substring(0,10);
    if (!map[k]) map[k]={date:k,sessions:0,nmv:0,ctr:0,cvr:0,orders:0,_n:0};
    map[k].sessions+=r.sessions; map[k].nmv+=r.nmv;
    map[k].ctr+=r.ctr; map[k].cvr+=r.cvr;
    map[k].orders+=r.orders; map[k]._n++;
  });
  return Object.values(map).sort(function(a,b){return a.date<b.date?-1:1;}).map(function(w){
    if (w._n>0){w.ctr=Math.round(w.ctr/w._n*100)/100;w.cvr=Math.round(w.cvr/w._n*100)/100;}
    return w;
  });
}

// ── Vertical helpers ─────────────────────────────────────────────────────
function getVertical(name) {
  // Taxonomy A1: BEAUTY ELECTRONICS / BEAUTY PERSONAL CARE / BEAUTY PROFESSIONAL / FRAGRANCES / HAIR / MAKEUP
  var n = (name||'').toUpperCase();
  // BEAUTY ELECTRONICS: electro, curling, dryers, straighteners, epilators, shavers, brushes
  if (/ELECTROBEAUTY|ELECTRO BEAUTY|ELECTRO/.test(n))    return 'Beauty Electronics';
  // HAIR: cuidado del cabello, hair care
  if (/CUIDADO DEL CABELLO|HAIR CARE|CABELLO/.test(n))   return 'Hair';
  // MAKEUP: maquillaje, make up, eyes makeup, lips, under eye
  if (/MAQUILLAJE|MAKE UP|UNDER EYE|EYES MAKEUP|LIPS/.test(n)) return 'Makeup';
  // FRAGRANCES: fragancias, gourmand
  if (/FRAGANC|FRAGRANC|GOURMAND/.test(n))               return 'Fragrances';
  // BEAUTY PROFESSIONAL: belleza profesional, manicuria, salon, esthetic
  if (/BELLEZA PROF|BEAUTY PROF|MANICUR|SALON|ESTHETIC/.test(n)) return 'Beauty Professional';
  // BEAUTY PERSONAL CARE: dermocosmetica, skincare, facial, solar, cuidado de la piel, tendencias, kbeauty, peptidos, spicules, body care, viral, social
  if (/DERMOCOSMET|SKINCARE|CUIDADO DE LA PIEL|ANTI ACNE|ANTI EDAD|SOLAR|FACIAL|PEPTIDO|SPICULE|KBEAUTY|TENDENCIA|VIRAL|SOCIAL|PERSONAL CARE/.test(n)) return 'Beauty Personal Care';
  // fallback: containers con BELLEZA/BEAUTY genericos → Personal Care
  if (/BELLEZA|BEAUTY/.test(n))                          return 'Beauty Personal Care';
  return 'Otros';
}

function buildVerticalSessions() {
  var allCont = getAllContainersFlat();
  var map = {};
  allCont.forEach(function(c) {
    var v = getVertical(c.container);

    });

function drawEvolMonthChart(metric) {
  var months = window._evolMonths || [];
  if (!months.length) return;
  var isPct = metric === 'ctr' || metric === 'cvr';
  var label = {sessions:'Sesiones',nmv:'NMV',orders:'Órdenes',ctr:'CTR %',cvr:'CVR %'}[metric] || metric;
  var data = months.map(function(m){ return isPct ? Math.round(m[metric]*1000)/10 : m[metric]; });
  var ctx = document.getElementById('evolMonthC');
  if (!ctx) return;
  destroyChart('evolMonth');
  charts.evolMonth = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: months.map(function(m){ return m.key; }),
      datasets: [{
        label: label,
        data: data,
        backgroundColor: '#e91e8c99',
        borderColor: '#e91e8c',
        borderWidth: 1,
        borderRadius: 4
      }]
    },
    options: {
      plugins: { legend: { display: false } },
      scales: {
        y: { beginAtZero: true, ticks: { callback: function(v){ return isPct ? v+'%' : v >= 1e6 ? (v/1e6).toFixed(1)+'M' : v >= 1e3 ? (v/1e3).toFixed(0)+'K' : v; }, font: { size: 9 } } },
        x: { ticks: { font: { size: 9 } } }
      },
      responsive: true
    }
  });
}

function updateEvolMonthChart(metric) {
  destroyChart('evolMonth');
  drawEvolMonthChart(metric);
}

  // Dates for trend window (relative to data end 2026-05-20)
  var D_NOW  = '2026-05-20';
  var D_7    = '2026-05-14'; // last 7 days: May 14–20
  var D_14   = '2026-05-07'; // prev 7 days: May 7–13

  // Build per-container stats
  var byName = {};
  SOCIAL_CONTAINERS.forEach(function(c){ byName[c.name] = []; });
  allSocial.forEach(function(r){ if (byName[r.container]) byName[r.container].push(r); });

  var stats = SOCIAL_CONTAINERS.map(function(c) {

    var totNmv = rows.reduce(function(a,r){ return a+r.nmv; }, 0);
    var totOrd = rows.reduce(function(a,r){ return a+r.orders; }, 0);
    var avgCtr = totSes > 0 ? rows.reduce(function(a,r){ return a+r.ctr*r.sessions; },0)/totSes : 0;
    var avgCvr = totSes > 0 ? rows.reduce(function(a,r){ return a+r.cvr*r.sessions; },0)/totSes : 0;
    var last7  = rows.filter(function(r){ return r.date>=D_7; });
    var prev7  = rows.filter(function(r){ return r.date>=D_14&&r.date<D_7; });
    var ses7   = last7.reduce(function(a,r){ return a+r.sessions; },0);
    var sesPrev= prev7.reduce(function(a,r){ return a+r.sessions; },0);
    var trend  = sesPrev>0 ? Math.round((ses7-sesPrev)/sesPrev*100) : null;
    return {
      def:c, rows:rows,
      totSes:totSes, totNmv:totNmv, totOrd:totOrd,
      avgCtr:Math.round(avgCtr*100)/100,
      avgCvr:Math.round(avgCvr*100)/100,
      ses7:ses7, sesPrev:sesPrev, trend:trend,
      dateFirst:rows[0].date, dateLast:rows[rows.length-1].date
    };

  // ── Cards ─────────────────────────────────────────────────────────────

        '<div class="sc-kpis">'+

      var mon=new Date(d); mon.setUTCDate(diff);
      var k=mon.toISOString().substring(0,10);

      weekMap[k][s.def.name]+=r.sessions;
    });

  var weeks = Object.keys(weekMap).sort();

function buildSocialInsights(stats) {
  if (!stats.length) return [];
  var ins = [];
  var bySession = stats.slice().sort(function(a,b){ return b.totSes-a.totSes; });
  var byCtr     = stats.slice().sort(function(a,b){ return b.avgCtr-a.avgCtr; });
  var byCvr     = stats.slice().sort(function(a,b){ return b.avgCvr-a.avgCvr; });

  // 1. Líder en sesiones
  var top2 = bySession.slice(0,2);
  ins.push({ icon:'🏆', color:'#1d6fa4', title:'Mayor volumen de tráfico',
    text: '<b>'+escHTML(top2[0].def.label)+'</b> lidera con <b>'+fNum(top2[0].totSes)+'</b> sesiones acumuladas' +
          (top2[1] ? ' · <b>'+escHTML(top2[1].def.label)+'</b> segundo con '+fNum(top2[1].totSes) : '') + '.' });

  // 2. Mejor CTR
  ins.push({ icon:'🎯', color:'#e91e8c', title:'Mejor engagement (CTR)',
    text: '<b>'+escHTML(byCtr[0].def.label)+'</b> tiene el CTR más alto: <b>'+fPct(byCtr[0].avgCtr)+'</b>. ' +
          'Indica alta intención de compra desde contenido social. ' +
          (byCtr.length > 1 ? 'Le sigue <b>'+escHTML(byCtr[1].def.label)+'</b> con '+fPct(byCtr[1].avgCtr)+'.' : '') });

  // 3. Mejor CVR
  if (byCvr[0] && byCvr[0].avgCvr > 0) {
    ins.push({ icon:'💰', color:'#00a650', title:'Mejor conversión (CVR)',
      text: '<b>'+escHTML(byCvr[0].def.label)+'</b> convierte mejor: <b>'+fPct(byCvr[0].avgCvr)+'</b> CVR → '+
            'el tráfico que llega ya viene con intención de compra.' });
  }

  // 4. Tendencias positivas (última semana vs anterior)
  var growing  = stats.filter(function(s){ return s.trend!==null && s.trend>10; })
                      .sort(function(a,b){ return b.trend-a.trend; });
  var declining= stats.filter(function(s){ return s.trend!==null && s.trend<-10; })
                      .sort(function(a,b){ return a.trend-b.trend; });
  var stable   = stats.filter(function(s){ return s.trend!==null && s.trend>=-10 && s.trend<=10; });

  if (growing.length) {
    ins.push({ icon:'📈', color:'#00a650', title:'En crecimiento – última semana vs anterior',
      text: growing.map(function(s){
        return '<b>'+escHTML(s.def.label)+'</b>: +'+s.trend+'% ('+fNum(s.sesPrev)+'→'+fNum(s.ses7)+' ses.)';
      }).join(' &nbsp;·&nbsp; ') });
  }
  if (declining.length) {
    ins.push({ icon:'📉', color:'#e53e3e', title:'Caída de tráfico – revisar contenido',
      text: declining.map(function(s){
        return '<b>'+escHTML(s.def.label)+'</b>: '+s.trend+'% ('+fNum(s.sesPrev)+'→'+fNum(s.ses7)+' ses.)';
      }).join(' &nbsp;·&nbsp; ') +
      ' → Potencial causa: menor rotación de contenido social o fin de pico de tendencia.' });
  }
  if (stable.length && !growing.length && !declining.length) {
    ins.push({ icon:'➡️', color:'#6b7280', title:'Tráfico estable',
      text: 'Todos los containers muestran variación menor a ±10% semana a semana.' });
  }

  // 5. Oportunidad: alto CTR + bajo volumen
  var avgSes = stats.reduce(function(a,s){ return a+s.totSes; },0) / stats.length;
  var avgCtr = stats.reduce(function(a,s){ return a+s.avgCtr; },0) / stats.length;
  var opps   = stats.filter(function(s){ return s.avgCtr > avgCtr*1.15 && s.totSes < avgSes*0.85; });
  if (opps.length) {
    ins.push({ icon:'💡', color:'#f59e0b', title:'Oportunidad de escala',
      text: opps.map(function(s){
        return '<b>'+escHTML(s.def.label)+'</b> tiene CTR <b>'+fPct(s.avgCtr)+'</b> (sobre promedio) pero '+
               'solo <b>'+fNum(s.totSes)+'</b> sesiones → activar más tráfico puede impactar directamente en NMV.';
      }).join(' ') });
  }

  // 6. Containers con muy pocas sesiones / datos
  var lowData = stats.filter(function(s){ return s.totSes < 500 || s.rows.length < 5; });
  if (lowData.length) {
    ins.push({ icon:'⚠️', color:'#9ca3af', title:'Datos insuficientes para análisis',
      text: lowData.map(function(s){
        return '<b>'+escHTML(s.def.label)+'</b> ('+fNum(s.totSes)+' ses., '+s.rows.length+' días)';
      }).join(' · ') + ' → Pocos días activos, revisar si el container sigue en vivo.' });
  }

  // 7. K-Beauty note
  ins.push({ icon:'🇰🇷', color:'#374151', title:'K-Beauty – aclaración',
    text: 'No aparece en <code>bq_containers</code> para el período analizado (abr-may 2026). ' +
          'Estuvo activo en Hot Sale bajo el container <code>mk-ao-hotsale-2026-beauty-kbeauty</code> — ' +
          'si creció, evaluar activarlo como container siempre activo.' });

  return ins;
}

// ── Dashboard Insights ───────────────────────────────────────────────────
function buildDashInsights(d, weeks) {
  if (!d || !d.length) return '';
  var ins = [];

  var totSes  = d.reduce(function(a,r){ return a+r.sessions; }, 0);
  var totNmv  = d.reduce(function(a,r){ return a+r.nmv; }, 0);
  var totOrd  = d.reduce(function(a,r){ return a+r.orders; }, 0);
  var avgCvr  = totSes>0 ? d.reduce(function(a,r){ return a+r.cvr*r.sessions; },0)/totSes : 0;
  var avgCtr  = totSes>0 ? d.reduce(function(a,r){ return a+r.ctr*r.sessions; },0)/totSes : 0;

  // 1. Tendencia reciente (últimas 2 semanas vs 2 anteriores)
  if (weeks && weeks.length >= 4) {
    var last2  = weeks.slice(-2);
    var prev2  = weeks.slice(-4,-2);
    var ses2   = last2.reduce(function(a,w){ return a+w.sessions; },0);
    var sesp2  = prev2.reduce(function(a,w){ return a+w.sessions; },0);
    var trend  = sesp2>0 ? Math.round((ses2-sesp2)/sesp2*100) : null;
    if (trend !== null) {
      var tDir = trend>5?'📈':(trend<-5?'📉':'➡️');
      var tCls = trend>5?'up':(trend<-5?'down':'flat');
      ins.push({ icon:tDir, color: trend>5?'#00a650':(trend<-5?'#e53e3e':'#6b7280'),
        title: 'Tendencia últimas 2 semanas vs 2 anteriores',
        text: 'Sesiones: <b class="'+tCls+'">'+(trend>0?'+':'')+trend+'%</b> · '+
              fNum(sesp2)+'→<b>'+fNum(ses2)+'</b> sesiones · ' +
              (trend>5?'Tráfico en alza — buen momento para activar más contenido.':
               trend<-5?'Caída de tráfico — revisar vigencia de campañas activas.':
               'Tráfico estable semana a semana.') });
    }
  }

  // 2. Mejor semana (pico de sesiones)
  if (weeks && weeks.length) {
    var peakW = weeks.reduce(function(a,w){ return w.sessions>a.sessions?w:a; }, weeks[0]);
    var avgW  = totSes / weeks.length;
    var pctPeak = Math.round(peakW.sessions/avgW*100-100);
    ins.push({ icon:'🏆', color:'#1d6fa4',
      title: 'Pico de tráfico: semana del ' + peakW.date.substring(5),
      text: '<b>'+fNum(peakW.sessions)+'</b> sesiones · <b>+'+pctPeak+'%</b> sobre el promedio semanal ('+fNum(Math.round(avgW))+'). '+
            'CVR esa semana: <b>'+fPct(peakW.cvr)+'</b>.' });
  }

  // 3. CVR vs promedio
  var cvrRound = Math.round(avgCvr*100)/100;
  var cvrMsg = avgCvr >= 4 ? 'Conversión <b>alta</b> — el tráfico llega con intención de compra.' :
               avgCvr >= 2 ? 'Conversión <b>media</b> — hay margen para optimizar el funnel post-landing.' :
               'Conversión <b>baja</b> — revisar relevancia de los containers y precios en landing.';
  ins.push({ icon:'🎯', color:'#f97316',
    title: 'CVR del período: ' + fPct(cvrRound),
    text: cvrMsg + ' CTR promedio: <b>'+fPct(Math.round(avgCtr*100)/100)+'</b>.' });

  // 4. NMV por sesión
  var nmvSes = totSes>0 ? Math.round(totNmv/totSes) : 0;
  ins.push({ icon:'💰', color:'#00a650',
    title: 'NMV por sesión: $' + nmvSes.toLocaleString('es-AR'),
    text: '<b>'+fMoney(totNmv)+'</b> NMV total en <b>'+fNum(totSes)+'</b> sesiones · '+
          '<b>'+fNum(totOrd)+'</b> órdenes generadas.' });

  // 5. MLA context si hay datos
  if (typeof RAW_MLA_MENSUAL !== 'undefined' && RAW_MLA_MENSUAL.length) {
    var lastMLA = RAW_MLA_MENSUAL[RAW_MLA_MENSUAL.length-1];
    var beautyShare = lastMLA.nmv_mla > 0 ? (lastMLA.nmv_beauty/lastMLA.nmv_mla*100).toFixed(1) : null;
    if (beautyShare) {

function renderFunnel() {
  var d = filtered;
  if (!d.length) {
    setHtml('<div style="padding:40px;text-align:center;color:var(--muted)">Sin datos para el período seleccionado.</div>');
    return;
  }

  var totSes    = d.reduce(function(a,r){ return a + r.sessions; }, 0);
  var totClicks = d.reduce(function(a,r){ return a + r.sessions * r.ctr; }, 0);
  var totBuyers = d.reduce(function(a,r){ return a + r.buyers; }, 0);
  var totOrders = d.reduce(function(a,r){ return a + r.orders; }, 0);

  var steps = [
    { label: 'Sesiones landing',   val: totSes,    color: '#1d6fa4' },
    { label: 'Clicks en items',    val: totClicks, color: '#0891b2' },
    { label: 'Compradores únicos', val: totBuyers, color: '#7c3aed' },
    { label: 'Órdenes',            val: totOrders, color: '#00a650' }
  ];

  var maxVal = steps[0].val || 1;

  function stepHtml(step, idx) {
    var pctTop = step.val / maxVal * 100;
    var pctFmt = (step.val / maxVal * 100).toFixed(1) + '%';
    var dropHtml = '';
    if (idx > 0) {
      var prev = steps[idx - 1].val;
      var conv = prev > 0 ? (step.val / prev * 100).toFixed(1) : '–';
      var drop = prev > 0 ? ((1 - step.val / prev) * 100).toFixed(1) : '–';
      dropHtml = '<div class="funnel-arrow">' +
        '<span>▼</span>' +
        '<span style="font-size:11px;color:var(--muted)">conv. <b style="color:var(--text)">' + conv + '%</b></span>' +
        '<span class="funnel-dropoff">-' + drop + '%</span>' +
        '</div>';
    }
    return dropHtml +
      '<div class="funnel-step">' +
        '<div class="funnel-bar-outer">' +
          '<div class="funnel-bar-fill" style="width:' + Math.max(pctTop, 8) + '%;background:' + step.color + '">' +
            '<span class="funnel-bar-label">' + step.label + '</span>' +
            '<span class="funnel-bar-val">' + fNum(Math.round(step.val)) + '</span>' +
          '</div>' +
          '<span class="funnel-bar-pct">' + pctFmt + '</span>' +
        '</div>' +
      '</div>';
  }

  var overallCvr  = totSes    > 0 ? (totBuyers / totSes    * 100).toFixed(2) : '–';
  var ctrAvg      = totSes    > 0 ? (totClicks / totSes    * 100).toFixed(2) : '–';
  var clickToCvr  = totClicks > 0 ? (totBuyers / totClicks * 100).toFixed(2) : '–';
  var ordPerBuyer = totBuyers > 0 ? (totOrders / totBuyers      ).toFixed(2) : '–';

  var summaryKpis = [
    { label: 'CTR medio',           val: ctrAvg + '%',      color: '#0891b2', note: 'ses → clicks' },
    { label: 'CVR landing',         val: overallCvr + '%',  color: '#f97316', note: 'ses → compradores' },
    { label: 'CVR post-click',      val: clickToCvr + '%',  color: '#7c3aed', note: 'clicks → compradores' },
    { label: 'Órdenes / comprador', val: ordPerBuyer + 'x', color: '#00a650', note: 'fidelidad de compra' }
  ];
  var kpiHtml = summaryKpis.map(function(k) {
    return '<div class="kpi">' +
      '<div class="kpi-accent" style="background:' + k.color + '"></div>' +
      '<div class="kpi-top"><span class="kpi-name">' + k.label + '</span></div>' +
      '<div class="kpi-val" style="color:' + k.color + '">' + k.val + '</div>' +
      '<div class="kpi-bench">' + k.note + '</div>' +
    '</div>';
  }).join('');

  var monthly = {};
  d.forEach(function(r) {
    var k = r.date.substring(0,7);
    if (!monthly[k]) monthly[k] = { key:k, sessions:0, clicks:0, buyers:0, orders:0 };
    monthly[k].sessions += r.sessions;
    monthly[k].clicks   += r.sessions * r.ctr;
    monthly[k].buyers   += r.buyers;
    monthly[k].orders   += r.orders;
  });
  var mRows = Object.values(monthly).sort(function(a,b){ return a.key < b.key ? -1 : 1; });

  var tblRows = mRows.map(function(m) {
    var ctr = m.sessions > 0 ? (m.clicks  / m.sessions * 100).toFixed(2)+'%' : '–';
    var cvr = m.sessions > 0 ? (m.buyers  / m.sessions * 100).toFixed(2)+'%' : '–';
    var c2c = m.clicks   > 0 ? (m.buyers  / m.clicks   * 100).toFixed(2)+'%' : '–';
    return '<tr>' +
      '<td style="font-weight:600">' + m.key + '</td>' +
      '<td style="text-align:right">' + fNum(Math.round(m.sessions)) + '</td>' +
      '<td style="text-align:right">' + fNum(Math.round(m.clicks)) + '</td>' +
      '<td style="text-align:right;color:#0891b2;font-weight:600">' + ctr + '</td>' +
      '<td style="text-align:right">' + fNum(Math.round(m.buyers)) + '</td>' +
      '<td style="text-align:right;color:#f97316;font-weight:600">' + cvr + '</td>' +
      '<td style="text-align:right;color:#7c3aed;font-weight:600">' + c2c + '</td>' +
      '<td style="text-align:right">' + fNum(Math.round(m.orders)) + '</td>' +
    '</tr>';
  }).join('');

  var html =
    '<div class="sec-hdr"><span class="sec-title">🎯 Funnel de Conversión — Landing Beauty</span>' +
    '<span class="sec-sub">Período seleccionado · sesiones → clicks → compradores → órdenes</span></div>' +
    '<div class="kpi-grid" style="margin-bottom:16px">' + kpiHtml + '</div>' +
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px">' +
      '<div>' +
        '<div style="font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px">Funnel acumulado · período</div>' +
        '<div class="funnel-wrap">' + steps.map(stepHtml).join('') + '</div>' +
      '</div>' +
      '<div class="chart-card"><div class="cc-title"><span>Evolución mensual</span>' +
        '<select class="metric-sel" id="funnelMetSel" onchange="updateFunnelChart(this.value)">' +
          '<option value="cvr">CVR (ses → comprador)</option>' +
          '<option value="ctr">CTR (ses → click)</option>' +
          '<option value="c2c">CVR post-click</option>' +
        '</select>' +
      '</div><canvas id="funnelC" height="160"></canvas></div>' +
    '</div>' +
    '<div class="tbl-card"><div class="tbl-top"><span class="tbl-title">Detalle mensual del funnel</span></div>' +
    '<table><thead><tr>' +
      '<th>Mes</th>' +
      '<th style="text-align:right">Sesiones</th>' +
      '<th style="text-align:right">Clicks</th>' +
      '<th style="text-align:right;color:#0891b2">CTR</th>' +
      '<th style="text-align:right">Compradores</th>' +
      '<th style="text-align:right;color:#f97316">CVR</th>' +
      '<th style="text-align:right;color:#7c3aed">CVR post-click</th>' +
      '<th style="text-align:right">Órdenes</th>' +
    '</tr></thead><tbody>' + tblRows + '</tbody></table></div>';

  setHtml(html);
  window._funnelMonths = mRows;
  destroyChart('funnel');
  drawFunnelChart('cvr');
}

function drawFunnelChart(metric) {
  var mRows = window._funnelMonths || [];
  var ctx = document.getElementById('funnelC');
  if (!ctx || !mRows.length) return;
  var cfg = {
    cvr: { fn: function(m){ return m.sessions > 0 ? m.buyers  / m.sessions  * 100 : 0; }, color: '#f97316', label: 'CVR %' },
    ctr: { fn: function(m){ return m.sessions > 0 ? m.clicks  / m.sessions  * 100 : 0; }, color: '#0891b2', label: 'CTR %' },
    c2c: { fn: function(m){ return m.clicks   > 0 ? m.buyers  / m.clicks    * 100 : 0; }, color: '#7c3aed', label: 'CVR post-click %' }
  };
  var c = cfg[metric] || cfg.cvr;
  charts.funnel = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: mRows.map(function(m){ return m.key; }),
      datasets: [{
        label: c.label,
        data: mRows.map(function(m){ return Math.round(c.fn(m) * 100) / 100; }),
        backgroundColor: c.color + '99',
        borderColor: c.color,
        borderWidth: 1,
        borderRadius: 4
      }]
    },
    options: {
      plugins: { legend: { display: false } },
      scales: {
        y: { beginAtZero: true, ticks: { callback: function(v){ return v + '%'; }, font: { size: 9 } } },
        x: { ticks: { font: { size: 9 } } }
      },
      responsive: true
    }
  });
}

function updateFunnelChart(metric) {
  destroyChart('funnel');
  drawFunnelChart(metric);
}

function getBucketData(bucket) {
  var d = filtered;
  if (!d.length) return null;
  if (bucket.source === 'landing') {
    var totSes = d.reduce(function(a,r){ return a+r.sessions; },0);
    return {
      sessions: totSes,
      nmv:    d.reduce(function(a,r){ return a+r.nmv;    },0),
      orders: d.reduce(function(a,r){ return a+r.orders; },0),
      buyers: d.reduce(function(a,r){ return a+r.buyers; },0),
      ctr: totSes>0?Math.round(d.reduce(function(a,r){return a+r.ctr*r.sessions;},0)/totSes*100)/100:0,
      cvr: totSes>0?Math.round(d.reduce(function(a,r){return a+r.cvr*r.sessions;},0)/totSes*100)/100:0,
      rows: null
    };
  }
  // Container source
  var startDate = filtered[filtered.length-1] ? filtered[filtered.length-1].date : '2000-01-01';
  var endDate   = filtered[0] ? filtered[0].date : '9999-12-31';
  var contRows = (RAW_CONTAINERS||[]).filter(function(r){
    return r.date >= startDate && r.date <= endDate &&
           bucket.containers.indexOf(r.container) > -1;
  });
  if (!contRows.length) return null;
  var totSes = contRows.reduce(function(a,r){ return a+r.sessions; },0);
  // group by container
  var byName = {};
  contRows.forEach(function(r) {
    if (!byName[r.container]) byName[r.container]={container:r.container,sessions:0,nmv:0,orders:0,buyers:0,ctr_w:0,cvr_w:0};
    byName[r.container].sessions+=r.sessions; byName[r.container].nmv+=r.nmv;
    byName[r.container].orders+=r.orders; byName[r.container].buyers+=r.buyers;
    byName[r.container].ctr_w+=r.ctr*r.sessions; byName[r.container].cvr_w+=r.cvr*r.sessions;
  });
  Object.values(byName).forEach(function(c){
    c.ctr=c.sessions>0?Math.round(c.ctr_w/c.sessions*100)/100:0;
    c.cvr=c.sessions>0?Math.round(c.cvr_w/c.sessions*100)/100:0;
  });
  return {
    sessions: totSes,
    nmv:    contRows.reduce(function(a,r){ return a+r.nmv;    },0),
    orders: contRows.reduce(function(a,r){ return a+r.orders; },0),
    buyers: contRows.reduce(function(a,r){ return a+r.buyers; },0),
    ctr: totSes>0?Math.round(contRows.reduce(function(a,r){return a+r.ctr*r.sessions;},0)/totSes*100)/100:0,
    cvr: totSes>0?Math.round(contRows.reduce(function(a,r){return a+r.cvr*r.sessions;},0)/totSes*100)/100:0,
    rows: Object.values(byName).sort(function(a,b){return b.sessions-a.sessions;})
  };
}

      parentCol +
      '<th style="text-align:right">Visitas (M)</th>' +
      '<th style="text-align:right">NMV</th>' +
      '<th style="text-align:right">CVR</th>' +
    '</tr></thead><tbody>' +
    rows.map(function(r, i){
      var cvrDisp = r.cvr != null ? (+r.cvr).toFixed(2)+'%' : '–';
      var parentCells = '';
      if (agrupLevel === 'A2') parentCells = '<td style="color:var(--muted)">'+escHTML(r.a1||'')+'</td>';
      if (agrupLevel === 'A3') parentCells = '<td style="color:var(--muted)">'+escHTML(r.a1||'')+'</td><td style="color:var(--muted)">'+escHTML(r.a2||'')+'</td>';
      return '<tr>' +
        '<td><span class="rank">'+(i+1)+'</span></td>' +
        '<td style="font-weight:600">'+escHTML(r.name||r.a3||r.a2||r.a1||'')+'</td>' +
        parentCells +
        '<td style="text-align:right">'+(r.visits!=null?(+r.visits).toFixed(2)+'M':'–')+'</td>' +
        '<td style="text-align:right">'+fMoney(r.tgmv)+'</td>' +
        '<td style="text-align:right">'+cvrDisp+'</td>' +
      '</tr>';
    }).join('') +
    '</tbody></table></div>';

  setHtml(
    '<div style="margin-bottom:10px">' +
      '<div class="sec-hdr"><span class="sec-title">🗂️ Sesiones por Agrupador</span>' +
      '<span class="sec-sub">One Pager Beauty · Mayo 2026 · '+rows.length+' categorías</span></div>' +
    '</div>' +
    levSel +
    chartHtml +
    tableHtml
  );

  // ── Chart.js horizontal bar ──────────────────────────────────────────────
  destroyChart('agrup');
  var ctx = document.getElementById('agrupC');
  if (!ctx) return;

  var A1_COLORS = {
    'BEAUTY PERSONAL CARE': '#1d6fa4',
    'HAIR':                 '#00a650',
    'MAKEUP':               '#e91e8c',
    'FRAGRANCES':           '#f97316',
    'BEAUTY PROFESSIONAL':  '#7c3aed',
    'BEAUTY ELECTRONICS':   '#0891b2'
  };
  var colors = rows.map(function(r){
    var key = (r.a1||'').toUpperCase();
    return A1_COLORS[key] || '#9ca3af';
  });

  charts.agrup = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: rows.map(function(r){ return r.name || r.a3 || r.a2 || r.a1 || ''; }),
      datasets: [{
        label: 'Visitas',
        data: rows.map(function(r){ return r.visits; }),
        backgroundColor: colors,
        borderRadius: 3,
        barPercentage: 0.65
      }]
    },
    options: {
      indexAxis: 'y',
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: function(ctx){
              var r = rows[ctx.dataIndex];
              return [
                ' Visitas: '+(r.visits!=null?(+r.visits).toFixed(2)+'M':'–'),
                ' TGMV: '+fMoney(r.tgmv),
                ' CVR: '+(r.cvr!=null?(+r.cvr).toFixed(2)+'%':'–')
              ];
            }
          }
        }
      },
      scales: {
        x: { beginAtZero: true, ticks:{ font:{size:10}, callback:function(v){ return v+'M'; } } },
        y: { ticks:{ font:{size:10} } }
      }
    }
  });
}

function yoyArrow(v) {
  if (v == null) return '–';
  var pct = Math.round(v * 1000) / 10;
  var cls = pct > 0 ? 'up' : (pct < 0 ? 'down' : 'flat');
  var arrow = pct > 0 ? '▲' : (pct < 0 ? '▼' : '–');
  return '<span class="'+cls+'">'+arrow+' '+Math.abs(pct).toFixed(1)+'%</span>';
}

// ── Utils ────────────────────────────────────────────────────────────────
function setHtml(html){
  destroyAllCharts();
  document.getElementById('mc').innerHTML=html;
}
function destroyAllCharts(){
  Object.keys(charts).forEach(function(k){destroyChart(k);});
}
function destroyChart(k){
  if (charts[k]){try{charts[k].destroy();}catch(e){} charts[k]=null;}
}
</script>
</body>
</html>
